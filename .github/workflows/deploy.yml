name: Déploiement Deno Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # authentification OIDC auprès de Deno Deploy, aucun secret à gérer
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installer Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Build du site (Lume)
        run: deno task build

      - name: Déployer sur Deno Deploy
        uses: denoland/deployctl@v1
        with:
          project: portfolio # ← doit correspondre au nom du projet sur dash.deno.com
          entrypoint: serve.ts
