# /etc/nginx/conf.d/simoncourtois.com.conf
# Reverse proxy vers le serveur Deno (127.0.0.1:8000).
# certbot --nginx ajoutera automatiquement le bloc HTTPS (443) et la redirection.

server {
    listen 80;
    listen [::]:80;
    server_name simoncourtois.com www.simoncourtois.com;

    # Corps de requête modeste : la seule écriture est un petit POST JSON de like.
    client_max_body_size 16k;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
